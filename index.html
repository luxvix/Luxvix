<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Luxvix Scripts</title>



<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">



<style>

body {

    margin: 0;

    font-family: Arial, sans-serif;

    background: linear-gradient(135deg, #0a0a0a, #1a0033);

    color: white;

    min-height: 100vh;

    display: flex;

    flex-direction: column;

    overflow-x: hidden;

}



/* 🌌 FONDO ANIMADO */

#bg {

    position: fixed;

    top: 0;

    left: 0;

    width: 100%;

    height: 100%;

    z-index: -2;

}



/* ✨ GLOW AMBIENTAL (NUEVO) */

body::before{

    content:"";

    position: fixed;

    inset: 0;

    background: radial-gradient(circle at 50% 20%, rgba(168,85,247,0.18), transparent 60%);

    z-index: -1;

}



/* TOPBAR */

.topbar {

    display: flex;

    justify-content: space-between;

    align-items: center;

    padding: 15px 40px;

    backdrop-filter: blur(10px);

}



/* LOGO */

.logo {

    font-family: 'Rajdhani', sans-serif;

    font-size: 1.8em;

    font-weight: 700;

    letter-spacing: 4px;

    color: #a855f7;

    text-transform: uppercase;

    animation: softGlow 4s ease-in-out infinite;

}



@keyframes softGlow {

    0% { text-shadow: 0 0 5px rgba(147,51,234,0.3); transform: translateY(0); }

    50% { text-shadow: 0 0 18px rgba(168,85,247,0.7); transform: translateY(-2px); }

    100% { text-shadow: 0 0 5px rgba(147,51,234,0.3); transform: translateY(0); }

}



/* SEARCH */

.search-box {

    position: relative;

}



.search-row {

    display: flex;

    align-items: center;

}



.search-box input {

    width: 220px;

    padding: 8px 8px 8px 30px; /* 🔥 icon spacing */

    border: none;

    border-bottom: 2px solid #9333ea;

    background: transparent;

    color: white;

    outline: none;

}



/* 🔎 ICONO BUSCADOR (NUEVO) */

.search-box::before{

    content:"🔎";

    position:absolute;

    left:8px;

    top:8px;

    opacity:0.5;

}



/* BUTTON */

.search-box button {

    margin-left: 8px;

    padding: 7px 12px;

    border-radius: 6px;

    border: 1px solid #9333ea;

    background: transparent;

    color: #9333ea;

    cursor: pointer;

}



.search-box button:hover {

    background: #9333ea;

    color: white;

}



/* 🔥 SUGERENCIAS */

#suggestions {

    position: absolute;

    top: 40px;

    width: 100%;

    background: rgba(0,0,0,0.25);

    backdrop-filter: blur(10px);

    border-radius: 8px;

    display: none;

}



#suggestions div {

    padding: 6px;

    cursor: pointer;

    animation: sugIn 0.2s ease forwards;

    opacity: 0;

}



@keyframes sugIn {

    from { opacity: 0; transform: translateY(8px); }

    to { opacity: 1; transform: translateY(0); }

}



/* MAIN */

.main {

    max-width: 1100px;

    margin: 0 auto;

    width: 100%;

}



/* DESCRIPTION */

.description {

    text-align: center;

    margin: 40px auto 20px;

    max-width: 700px;

    color: rgba(255,255,255,0.7);

}



/* GRID */

.container {

    display: grid;

    grid-template-columns: repeat(3, 1fr);

    gap: 20px;

    padding: 20px;

}



/* CARD */

.card {

    position: relative;

    border-radius: 12px;

    overflow: hidden;

    cursor: pointer;

    border: 2px solid rgba(168,85,247,0.3);

    transition: 0.3s;

    aspect-ratio: 16/9;

}



/* 🔥 MICRO INTERACCION NUEVA */

.card:hover {

    transform: scale(1.05);

    box-shadow: 0 0 25px #a855f7;

}



.card img {

    width: 100%;

    height: 100%;

    object-fit: cover;

}



/* OVERLAY */

.overlay {

    position: absolute;

    bottom: 0;

    left: 0;

    width: 100%;

    padding: 10px;

    background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);

}



/* TITLE */

.title {

    font-size: 1em;

    color: white;

    transition: 0.2s;

}



/* 🔥 hover text effect */

.card:hover .title{

    letter-spacing: 1px;

}



/* BADGE NUEVO */

.badge{

    position:absolute;

    top:8px;

    left:8px;

    background:#a855f7;

    padding:3px 8px;

    font-size:0.7em;

    border-radius:6px;

}



/* FOOTER */

footer {

    text-align: center;

    padding: 20px;

    color: rgba(255,255,255,0.5);

    margin-top: auto;

}



/* 📱 MOBILE FIX */

@media (max-width: 768px){

    .container{

        grid-template-columns: repeat(2, 1fr);

    }

}



@media (max-width: 480px){

    .container{

        grid-template-columns: 1fr;

    }

}

</style>

</head>



<body>



<canvas id="bg"></canvas>



<div class="topbar">

    <div class="logo">LUXVIX SCRIPTS</div>



    <div class="search-box">

        <div class="search-row">

            <input type="text" id="searchInput" placeholder="Buscar..." oninput="sugerencias()">

            <button onclick="irResultado()">Ir</button>

        </div>

        <div id="suggestions"></div>

    </div>

</div>



<div class="main">



<div class="description">

Busca scripts usando el buscador o explora las tarjetas. Haz clic en cualquiera para ver o acceder al contenido.

</div>



<div class="container">



<div class="card" data-name="destruction simulator" onclick="openGame()">

    <div class="badge">NEW</div>

    <img src="https://tr.rbxcdn.com/180DAY-0ea1f7a27ab46cc0d6ed6f4e242b6015/768/432/Image/Webp/noFilter">

    <div class="overlay">

        <div class="title">💥 Destruction Simulator</div>

    </div>

</div>

<div class="card">
    <div class="badge">SOON</div>
    <img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==" style="display:none;">
    <div class="overlay" style="display:flex;align-items:center;justify-content:center;height:100%;">
        <div class="title">COMING SOON</div>
    </div>
</div>


</div>

</div>



<footer>

© 2026 Luxvix Scripts — Todos los derechos reservados ⚡

</footer>



<script>

const cards = document.querySelectorAll('.card');



let audioCtx;



function initAudio(){

    if(!audioCtx){

        audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    }

}

document.addEventListener("click", initAudio);



function playSound(f, t, v){

    if(!audioCtx) return;



    const o = audioCtx.createOscillator();

    const g = audioCtx.createGain();



    o.frequency.value = f;

    g.gain.value = v;



    o.connect(g);

    g.connect(audioCtx.destination);



    o.start();

    o.stop(audioCtx.currentTime + t);

}



function openGame(){

    playSound(300,0.1,0.05);

    setTimeout(()=>{

        window.location.href="https://linkvertise.com/5155708/ULjBo37I3Fbj?o=sharing";

    },120);

}



cards.forEach(c=>{

    c.addEventListener("mouseenter", ()=> playSound(600,0.05,0.03));

});



function sugerencias(){

    const input = searchInput.value.toLowerCase();

    suggestions.innerHTML="";



    if(!input){

        suggestions.style.display="none";

        return;

    }



    cards.forEach((card,i)=>{

        if((card.dataset.name || "").toLowerCase().includes(input)){

            const div=document.createElement("div");

            div.textContent=card.innerText;

            div.style.animationDelay = (i*0.05)+"s";



            div.onclick=()=>{

                card.scrollIntoView({behavior:'smooth'});

                suggestions.style.display="none";

            };



            suggestions.appendChild(div);

        }

    });



    suggestions.style.display = suggestions.childElementCount ? "block":"none";

}



function irResultado(){

    const input = searchInput.value.toLowerCase();



    cards.forEach(card=>{

        if((card.dataset.name || "").toLowerCase().includes(input)){

            card.scrollIntoView({behavior:'smooth'});

        }

    });

}



/* 🌌 PARTICULAS */

const canvas = document.getElementById("bg");

const ctx = canvas.getContext("2d");



canvas.width = innerWidth;

canvas.height = innerHeight;



let particles = [];



function Particle(){

    this.x = Math.random()*canvas.width;

    this.y = Math.random()*canvas.height;

    this.size = Math.random()*3;

    this.vx = (Math.random()-0.5)*0.3;

    this.vy = (Math.random()-0.5)*0.3;

}



Particle.prototype.update=function(){

    this.x+=this.vx;

    this.y+=this.vy;



    if(this.x<0) this.x=canvas.width;

    if(this.x>canvas.width) this.x=0;

    if(this.y<0) this.y=canvas.height;

    if(this.y>canvas.height) this.y=0;

}



Particle.prototype.draw=function(){

    ctx.fillStyle="rgba(168,85,247,0.25)";

    ctx.beginPath();

    ctx.arc(this.x,this.y,this.size,0,Math.PI*2);

    ctx.fill();

}



for(let i=0;i<80;i++) particles.push(new Particle());



function animate(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach(p=>{p.update();p.draw();});

    requestAnimationFrame(animate);

}

animate();



window.addEventListener("resize",()=>{

    canvas.width=innerWidth;

    canvas.height=innerHeight;

});

</script>



</body>

</html>
