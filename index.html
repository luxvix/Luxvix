<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Luxvix Scripts</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0a0a0a, #1a0033);
    color: white;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
}

#bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -2;
}

body::before{
    content:"";
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at 50% 20%, rgba(168,85,247,0.18), transparent 60%);
    z-index: -1;
}

.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 40px;
    backdrop-filter: blur(10px);
}

.logo {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.8em;
    font-weight: 700;
    letter-spacing: 4px;
    color: #a855f7;
    text-transform: uppercase;
    animation: softGlow 4s ease-in-out infinite;
}

@keyframes softGlow {
    0% { text-shadow: 0 0 5px rgba(147,51,234,0.3); transform: translateY(0); }
    50% { text-shadow: 0 0 18px rgba(168,85,247,0.7); transform: translateY(-2px); }
    100% { text-shadow: 0 0 5px rgba(147,51,234,0.3); transform: translateY(0); }
}

.search-box {
    position: relative;
}

.search-row {
    display: flex;
    align-items: center;
}

.search-box input {
    width: 220px;
    padding: 8px 8px 8px 30px;
    border: none;
    border-bottom: 2px solid #9333ea;
    background: transparent;
    color: white;
    outline: none;
}

.search-box::before{
    content:"🔎";
    position:absolute;
    left:8px;
    top:8px;
    opacity:0.5;
}

.search-box button {
    margin-left: 8px;
    padding: 7px 12px;
    border-radius: 6px;
    border: 1px solid #9333ea;
    background: transparent;
    color: #9333ea;
    cursor: pointer;
}

.search-box button:hover {
    background: #9333ea;
    color: white;
}

#suggestions {
    position: absolute;
    top: 40px;
    width: 100%;
    background: #0a0a0a;
    backdrop-filter: blur(10px);
    border-radius: 8px;
    display: none;
}

#suggestions div {
    padding: 6px;
    cursor: pointer;
    animation: sugIn 0.2s ease forwards;
    opacity: 0;
}

@keyframes sugIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
}

.main {
    max-width: 1100px;
    margin: 0 auto;
    width: 100%;
}

.description {
    text-align: center;
    margin: 40px auto 20px;
    max-width: 700px;
    color: rgba(255,255,255,0.7);
}

.container {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    padding: 20px;
}

.card {
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    border: 2px solid rgba(168,85,247,0.3);
    transition: 0.3s;
    aspect-ratio: 16/9;
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px #a855f7;
}

.card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.overlay {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    padding: 10px;
    background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
}

.title {
    font-size: 1em;
    color: white;
    transition: 0.2s;
}

.card:hover .title{
    letter-spacing: 1px;
}

.badge{
    position:absolute;
    top:8px;
    left:8px;
    background:#a855f7;
    padding:3px 8px;
    font-size:0.7em;
    border-radius:6px;
}

footer {
    text-align: center;
    padding: 20px;
    color: rgba(255,255,255,0.5);
    margin-top: auto;
}

</style>

</head>

<body>

<canvas id="bg"></canvas>

<div class="topbar">
    <div class="logo">LUXVIX SCRIPTS</div>

    <div class="search-box">
        <div class="search-row">
            <input type="text" id="searchInput" placeholder="Buscar..." oninput="sugerencias()">
            <button onclick="irResultado()">Ir</button>
        </div>
        <div id="suggestions"></div>
    </div>
</div>

<div class="main">

<div class="description">
Busca scripts usando el buscador o explora las tarjetas. Haz clic en cualquiera para ver o acceder al contenido.
</div>

<div class="container">

<div class="card" data-name="aura battles destruction simulator aura" onclick="openAuraBattles()">
    <div class="badge">NEW</div>
    <img src="https://i.ibb.co/VYb2R55k/aura-o-laura.jpg">
    <div class="overlay">
        <div class="title">💥 Aura Battles</div>
    </div>
</div>

<div class="card" data-name="destruction simulator aura battles" onclick="openDestruction()">
    <img src="https://tr.rbxcdn.com/180DAY-0ea1f7a27ab46cc0d6ed6f4e242b6015/768/432/Image/Webp/noFilter">
    <div class="overlay">
        <div class="title">💥 Destruction Simulator</div>
    </div>
</div>

<div class="card">
    <div class="badge">SOON</div>
    <img src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==" style="display:none;">
    <div class="overlay" style="display:flex;align-items:center;justify-content:center;height:100%;">
        <div class="title">COMING SOON</div>
    </div>
</div>

</div>
</div>

<footer>
© 2026 Luxvix Scripts — Todos los derechos reservados ⚡
</footer>

<script>

const cards = document.querySelectorAll('.card');

let audioCtx;

function initAudio(){
    if(!audioCtx){
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
}

document.addEventListener("click", initAudio);

function playSound(f, t, v){
    if(!audioCtx) return;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.frequency.value = f;
    g.gain.value = v;
    o.connect(g);
    g.connect(audioCtx.destination);
    o.start();
    o.stop(audioCtx.currentTime + t);
}

function openAuraBattles(){
    playSound(300,0.1,0.05);
    setTimeout(()=>{
        window.location.href="https://linkvertise.com/5155708/U4bwL4PvG4K8?o=sharing";
    },120);
}

function openDestruction(){
    playSound(300,0.1,0.05);
    setTimeout(()=>{
        window.location.href="https://linkvertise.com/5155708/ULjBo37I3Fbj?o=sharing";
    },120);
}

cards.forEach(c=>{
    c.addEventListener("mouseenter", ()=> playSound(600,0.05,0.03));
});

/* 🔥 SOLO ESTA PARTE CAMBIADA */
function sugerencias(){

    const input = searchInput.value.toLowerCase().trim();
    suggestions.innerHTML="";

    if(!input){
        suggestions.style.display="none";
        return;
    }

    cards.forEach((card)=>{

        const name = (card.dataset.name || "").toLowerCase();

        if (name === input || name.startsWith(input)) {

            const div=document.createElement("div");
            div.textContent=card.innerText;

            div.onclick=()=>{
                card.scrollIntoView({behavior:'smooth'});
                suggestions.style.display="none";
            };

            suggestions.appendChild(div);
        }

    });

    suggestions.style.display = suggestions.childElementCount ? "block":"none";
}

function irResultado(){
    const input = searchInput.value.toLowerCase();
    cards.forEach(card=>{
        if((card.dataset.name || "").toLowerCase().includes(input)){
            card.scrollIntoView({behavior:'smooth'});
        }
    });
}

</script>

</body>
</html>
